<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Shanty Shack</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Libre+Baskerville&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        background-image:
          linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)),
          url("assets/images/hero.jpg");

        background-size: cover;
        background-position: center;

        font-family: "Libre Baskerville", serif;
      }

      /* central panel */

      .panel {
        background: rgba(10, 15, 20, 0.75);
        padding: 60px 70px;
        border-radius: 8px;

        text-align: center;

        backdrop-filter: blur(4px);

        box-shadow:
          0 0 60px rgba(0, 0, 0, 0.9),
          0 0 30px rgba(255, 190, 90, 0.15);

        max-width: 650px;
      }

      /* title */

      h1 {
        font-family: "Cinzel", serif;
        font-size: 52px;
        letter-spacing: 3px;

        color: #f7e2b3;

        text-shadow:
          0 0 8px rgba(255, 200, 120, 0.4),
          0 0 25px rgba(255, 170, 60, 0.25);

        margin-bottom: 20px;
      }

      /* subtitle text */

      p {
        font-size: 20px;
        color: #e7e7e7;

        line-height: 1.6;
      }

      /* divider rope style */

      .divider {
        width: 120px;
        height: 2px;

        background: #c9a86a;

        margin: 30px auto;

        opacity: 0.6;
      }

      /* small footer */

      .footer {
        margin-top: 25px;
        font-size: 14px;
        color: #cfcfcf;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="panel">
      <h1>The Shanty Shack</h1>

      <div class="divider"></div>

      <p>
        Custom sea shanties forged on the high seas.<br /><br />
        The tavern doors open soon.<br />
        Drop anchor and return shortly.
      </p>

      <div class="footer">⚓ www.theshantyshack.com ⚓</div>
    </div>
  </body>
</html>
